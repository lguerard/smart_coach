<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Connexion - Smart Coach</title>
<link rel="manifest" href="/static/manifest.json">
<meta name="theme-color" content="#0b0e14">
<link rel="icon" href="/static/icon-192.png" type="image/png">
<script src="https://cdn.tailwindcss.com"></script>
<style>
  :root {
    --bg-0: #0b0e14; --surface-1: rgba(255,255,255,0.045);
    --text-primary: #f3f4f6; --text-secondary: #a8adb8; --muted: #6f7480;
    --border: rgba(255,255,255,0.09); --blue: #4a90e8; --critical: #e6675f;
  }
  @media (prefers-color-scheme: light) {
    :root {
      --bg-0: #f3f4f2; --surface-1: rgba(255,255,255,0.72);
      --text-primary: #0b0b0b; --text-secondary: #52514e; --muted: #898781;
      --border: rgba(11,11,11,0.08); --blue: #2a78d6; --critical: #d03b3b;
    }
  }
  body {
    color: var(--text-primary); background-color: var(--bg-0);
    background-image:
      radial-gradient(60vw 60vw at 8% -10%, color-mix(in srgb, var(--blue) 22%, transparent), transparent 60%),
      radial-gradient(70vw 70vw at 50% 110%, color-mix(in srgb, #22c48f 14%, transparent), transparent 60%);
    background-attachment: fixed; background-repeat: no-repeat;
  }
  .card {
    background: var(--surface-1); border: 1px solid var(--border);
    border-radius: 20px; backdrop-filter: blur(24px) saturate(140%);
    box-shadow: 0 12px 40px rgba(0,0,0,0.45);
  }
</style>
</head>
<body class="min-h-screen flex items-center justify-center px-4" style="font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;">
  <div class="card p-6 w-full max-w-sm">
    <div class="flex items-center gap-2 mb-6">
      <img src="/static/icon-192.png" width="28" height="28" alt="" style="border-radius: 22%;">
      <span class="font-semibold text-lg">Smart Coach</span>
    </div>

    {% if error %}
    <p class="text-sm mb-4 p-2 rounded-lg" style="background: color-mix(in srgb, var(--critical) 15%, transparent); color: var(--critical);">
      {{ error }}
    </p>
    {% endif %}

    <form method="post" action="/login" class="space-y-3">
      <label class="block text-sm">
        Utilisateur
        <input name="username" required autofocus
          class="mt-1 w-full rounded-lg border px-3 py-2 text-sm bg-transparent" style="border-color: var(--border);">
      </label>
      <label class="block text-sm">
        Mot de passe
        <input name="password" type="password" required
          class="mt-1 w-full rounded-lg border px-3 py-2 text-sm bg-transparent" style="border-color: var(--border);">
      </label>
      <button type="submit"
        class="w-full rounded-xl py-3 text-sm font-medium text-white mt-2" style="background: var(--blue);">
        Se connecter
      </button>
    </form>

    <button type="button" id="passkeyBtn"
      class="w-full rounded-xl py-3 text-sm font-medium mt-3 border"
      style="border-color: var(--border); color: var(--text-primary); background: transparent;">
      &#128273; Se connecter avec une passkey
    </button>
    <p id="passkeyError" class="text-xs mt-2 hidden" style="color: var(--critical);"></p>

    <p class="text-xs mt-4" style="color: var(--muted);">
      Pas de compte ? <a href="/signup" style="color: var(--blue);">Creer un
      compte</a> (active apres approbation par l'admin).
    </p>
  </div>

  <script>
    const b64uToBuf = (s) => Uint8Array.from(
      atob(s.replace(/-/g, "+").replace(/_/g, "/")), c => c.charCodeAt(0));
    const bufToB64u = (b) => btoa(String.fromCharCode(...new Uint8Array(b)))
      .replace(/\+/g, "-").replace(/\//g, "_").replace(/=+$/, "");

    document.getElementById("passkeyBtn").addEventListener("click", async () => {
      const errEl = document.getElementById("passkeyError");
      errEl.classList.add("hidden");
      try {
        const options = await (await fetch("/passkey/login/options")).json();
        options.challenge = b64uToBuf(options.challenge);
        (options.allowCredentials || []).forEach(c => c.id = b64uToBuf(c.id));
        const cred = await navigator.credentials.get({ publicKey: options });
        const payload = { credential: {
          id: cred.id, rawId: bufToB64u(cred.rawId), type: cred.type,
          response: {
            clientDataJSON: bufToB64u(cred.response.clientDataJSON),
            authenticatorData: bufToB64u(cred.response.authenticatorData),
            signature: bufToB64u(cred.response.signature),
            userHandle: cred.response.userHandle ? bufToB64u(cred.response.userHandle) : null,
          },
          clientExtensionResults: cred.getClientExtensionResults(),
        }};
        const resp = await fetch("/passkey/login", {
          method: "POST", headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload),
        });
        if (resp.ok) { location.href = "/"; return; }
        errEl.textContent = (await resp.json()).error || "Echec de la connexion";
        errEl.classList.remove("hidden");
      } catch (e) {
        errEl.textContent = e.message || "Passkey annulee";
        errEl.classList.remove("hidden");
      }
    });
  </script>
</body>
</html>
